<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Teapot — Server-Side Rendering</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; background: #1a1a2e; }
    img#stream {
      display: block;
      width: 100%;
      height: 100vh;
      object-fit: fill;
    }
  </style>
</head>
<body>
  <img id="stream" alt="">
  <script>
    function reconnect() {
      var w = window.innerWidth, h = window.innerHeight;
      document.getElementById('stream').src = '/stream?w=' + w + '&h=' + h;
    }
    window.addEventListener('load', reconnect);
    window.addEventListener('resize', reconnect);
  </script>
</body>
</html>
